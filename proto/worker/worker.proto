syntax = "proto3";

package worker;

option go_package = "github.com/opensandbox/opensandbox/proto/worker";

service SandboxWorker {
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse);
  rpc DestroySandbox(DestroySandboxRequest) returns (DestroySandboxResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);

  rpc ExecCommand(ExecCommandRequest) returns (ExecCommandResponse);
  rpc ExecCommandStream(ExecCommandRequest) returns (stream ExecOutputChunk);

  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  rpc CreatePTY(CreatePTYRequest) returns (CreatePTYResponse);
  rpc PTYStream(stream PTYInput) returns (stream PTYOutput);

  rpc ExecSessionCreate(ExecSessionCreateRequest) returns (ExecSessionCreateResponse);
  rpc ExecSessionList(ExecSessionListRequest) returns (ExecSessionListResponse);
  rpc ExecSessionKill(ExecSessionKillRequest) returns (ExecSessionKillResponse);

  rpc HibernateSandbox(HibernateSandboxRequest) returns (HibernateSandboxResponse);
  rpc WakeSandbox(WakeSandboxRequest) returns (WakeSandboxResponse);

  // Reboot performs a soft, in-place guest reset (QMP system_reset). The
  // QEMU process, network, and workspace stay in place; only the guest
  // kernel and processes are reset. Recovers from in-guest wedges (zombie
  // pile, OOM-killed agent, runaway process).
  rpc RebootSandbox(RebootSandboxRequest) returns (RebootSandboxResponse);

  // PowerCycle does a hard reset: tears down the QEMU process and
  // cold-boots a fresh VM with the existing workspace.qcow2. Use when the
  // VMM itself is wedged (QMP unresponsive) or a soft reboot didn't
  // recover. Sandbox keeps its ID, project, secrets, and persistent data;
  // it gets a new TAP, host port, and PID.
  rpc PowerCycleSandbox(PowerCycleSandboxRequest) returns (PowerCycleSandboxResponse);

  rpc SaveAsTemplate(SaveAsTemplateRequest) returns (SaveAsTemplateResponse);

  rpc CreateCheckpoint(CreateCheckpointRequest) returns (CreateCheckpointResponse);
  rpc RestoreCheckpoint(RestoreCheckpointRequest) returns (RestoreCheckpointResponse);

  rpc BuildTemplate(BuildTemplateRequest) returns (BuildTemplateResponse);

  rpc GetSandboxStats(GetSandboxStatsRequest) returns (GetSandboxStatsResponse);

  rpc SetSandboxLimits(SetSandboxLimitsRequest) returns (SetSandboxLimitsResponse);

  // UpdateSandboxSecret refreshes the value the proxy substitutes for a
  // sealed token, by env-var name. Used by the secret-store update flow:
  // when a customer PUTs a new value, the CP fans out this RPC to every
  // worker hosting a sandbox that uses the store. Sealed token IDs and
  // sandbox env vars are unchanged — only the proxy session's value map
  // updates, so the next outbound HTTPS substitution uses the new value.
  rpc UpdateSandboxSecret(UpdateSandboxSecretRequest) returns (UpdateSandboxSecretResponse);

  // Live migration between workers
  rpc PreCopyDrives(PreCopyDrivesRequest) returns (PreCopyDrivesResponse);
  rpc PrepareMigrationIncoming(PrepareMigrationIncomingRequest) returns (PrepareMigrationIncomingResponse);
  rpc LiveMigrate(LiveMigrateRequest) returns (LiveMigrateResponse);
  rpc CompleteMigrationIncoming(CompleteMigrationIncomingRequest) returns (CompleteMigrationIncomingResponse);

  // Golden snapshot management
  rpc RebuildGoldenSnapshot(RebuildGoldenSnapshotRequest) returns (RebuildGoldenSnapshotResponse);
}

message CreateSandboxRequest {
  string template = 1;
  int32 timeout = 2;
  map<string, string> envs = 3;
  int32 memory_mb = 4;
  int32 cpu_count = 5;
  bool network_enabled = 6;
  string image_ref = 7;
  int32 port = 8;  // container port to expose via subdomain (default 80)
  // Sandbox snapshot template: if non-empty, boot from these S3 keys instead of base image.
  string template_rootfs_key = 9;
  string template_workspace_key = 10;
  // If set, attempt warm fork from local checkpoint snapshot (LoadSnapshot instead of cold boot).
  string checkpoint_id = 11;
  // Server-assigned sandbox ID. If non-empty, worker uses this instead of generating one.
  string sandbox_id = 12;
  // Egress allowlist: if non-empty, only these hosts can be reached.
  repeated string egress_allowlist = 13;
  // Per-secret host restrictions for secrets proxy.
  map<string, string> secret_allowed_hosts = 14;
  // Env vars resolved from a SecretStore. Sealed by the worker's secrets proxy
  // before injection into the VM. Disjoint from `envs` (which is plaintext).
  map<string, string> secret_envs = 15;
  int32 disk_mb = 16;  // workspace disk size in MB (0 = default 20GB)
}

message CreateSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
  // Effective memory of the created sandbox. May differ from
  // CreateSandboxRequest.memory_mb when forking from a checkpoint: the
  // snapshot's base memory is the floor (downscale would OOM restored
  // processes), and the hotplug ceiling caps the upper end. Always reflects
  // the actual value the sandbox is running at.
  int32 memory_mb = 3;
}

message DestroySandboxRequest {
  string sandbox_id = 1;
}

message DestroySandboxResponse {}

message RebootSandboxRequest {
  string sandbox_id = 1;
}

message RebootSandboxResponse {}

message PowerCycleSandboxRequest {
  string sandbox_id = 1;
}

message PowerCycleSandboxResponse {
  // host_port is the new external port the sandbox is reachable on after
  // power-cycle. Power-cycle re-allocates the TAP and DNAT mapping, so the
  // port may differ from the original. Control plane uses this to update
  // its routing record.
  int32 host_port = 1;
}

message GetSandboxRequest {
  string sandbox_id = 1;
}

message GetSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
  string template = 3;
  int64 started_at = 4;
  int64 end_at = 5;
}

message ListSandboxesRequest {}

message ListSandboxesResponse {
  repeated GetSandboxResponse sandboxes = 1;
}

message ExecCommandRequest {
  string sandbox_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> envs = 4;
  string cwd = 5;
  int32 timeout = 6;
}

message ExecCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message ExecOutputChunk {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
}

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ReadFileResponse {
  bytes content = 1;
}

message WriteFileRequest {
  string sandbox_id = 1;
  string path = 2;
  bytes content = 3;
}

message WriteFileResponse {}

message ListDirRequest {
  string sandbox_id = 1;
  string path = 2;
}

message DirEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  string path = 4;
}

message ListDirResponse {
  repeated DirEntry entries = 1;
}

message CreatePTYRequest {
  string sandbox_id = 1;
  int32 cols = 2;
  int32 rows = 3;
  string shell = 4;
}

message CreatePTYResponse {
  string session_id = 1;
}

message PTYInput {
  string session_id = 1;
  oneof input {
    bytes data = 2;
    PTYResize resize = 3;
  }
}

message PTYResize {
  int32 cols = 1;
  int32 rows = 2;
}

message PTYOutput {
  string session_id = 1;
  bytes data = 2;
}

message HibernateSandboxRequest {
  string sandbox_id = 1;
}

message HibernateSandboxResponse {
  string sandbox_id = 1;
  string checkpoint_key = 2;
  int64 size_bytes = 3;
}

message WakeSandboxRequest {
  string sandbox_id = 1;
  string checkpoint_key = 2;
  int32 timeout = 3;
}

message WakeSandboxResponse {
  string sandbox_id = 1;
  string status = 2;
}

message SaveAsTemplateRequest {
  string sandbox_id = 1;
  string template_id = 2;  // UUID assigned by control plane
}

message SaveAsTemplateResponse {
  string rootfs_s3_key = 1;
  string workspace_s3_key = 2;
}

message BuildTemplateRequest {
  string name = 1;
  string dockerfile = 2;
  string tag = 3;
  string ecr_image_ref = 4;
}

message BuildTemplateResponse {
  string image_ref = 1;
  string build_log = 2;
}

// --- Exec Sessions ---

message ExecSessionCreateRequest {
  string sandbox_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> envs = 4;
  string cwd = 5;
  int32 timeout_seconds = 6;
  int32 max_run_after_disconnect = 7;
}

message ExecSessionCreateResponse {
  string session_id = 1;
}

message ExecSessionListRequest {
  string sandbox_id = 1;
}

message ExecSessionListResponse {
  repeated ExecSessionInfoEntry sessions = 1;
}

message ExecSessionInfoEntry {
  string session_id = 1;
  string command = 2;
  repeated string args = 3;
  bool running = 4;
  int32 exit_code = 5;
  int64 started_at = 6;
  int32 attached_clients = 7;
}

message ExecSessionKillRequest {
  string sandbox_id = 1;
  string session_id = 2;
  int32 signal = 3;
}

message ExecSessionKillResponse {}

// --- Stats ---

message GetSandboxStatsRequest {
  string sandbox_id = 1;
}

message GetSandboxStatsResponse {
  double cpu_percent = 1;
  uint64 mem_usage = 2;
  uint64 mem_limit = 3;
  uint64 net_input = 4;
  uint64 net_output = 5;
  int32 pids = 6;
}

message CreateCheckpointRequest {
  string sandbox_id = 1;
  string checkpoint_id = 2;  // UUID assigned by control plane
  bool prepare_golden = 3;   // If true, prepare a golden snapshot from this checkpoint
}

message CreateCheckpointResponse {
  string rootfs_s3_key = 1;
  string workspace_s3_key = 2;
  // Size of the uploaded checkpoint archive in bytes. The control plane
  // persists this on the sandbox_checkpoints row instead of the previous
  // hardcoded 0, so customers and operators can see how big a checkpoint
  // actually is. Zero is reported when the archive failed to upload (the
  // checkpoint is still locally usable but cross-worker forks won't work).
  int64 size_bytes = 3;
}

message RestoreCheckpointRequest {
  string sandbox_id = 1;
  string checkpoint_id = 2;
}

message RestoreCheckpointResponse {
  bool success = 1;
}

message SetSandboxLimitsRequest {
  string sandbox_id = 1;
  int32 max_pids = 2;
  int64 max_memory_bytes = 3;
  int64 cpu_max_usec = 4;
  int64 cpu_period_usec = 5;
}

message SetSandboxLimitsResponse {}

// Live migration messages
message PreCopyDrivesRequest {
  string sandbox_id = 1;
  reserved 2;  // was flatten_rootfs — no longer used; source always uploads thin overlay
}

message PreCopyDrivesResponse {
  string rootfs_key = 1;       // S3 key for rootfs qcow2
  string workspace_key = 2;    // S3 key for workspace qcow2
  string golden_version = 3;   // golden version the sandbox was created from
  int32 base_memory_mb = 4;    // QEMU -m value from source (target must match for migration)
  int32 base_cpu_count = 5;    // QEMU -smp value from source (target must match for migration)
  // actual_memory_mb is the source QEMU process's current RSS in MB — a true
  // measure of how much host RAM the migration will land on the target.
  // Used for actual-memory-based scheduling instead of committed/configured
  // memory (which over-reserves on idle sandboxes).
  int32 actual_memory_mb = 6;
  // Secrets-proxy session state for the migrating sandbox. Live migration
  // moves the QEMU process (which carries the in-VM env vars containing
  // sealed token IDs) but the proxy's plaintext-substitution map is
  // per-worker in-process state. Without these the destination worker has
  // no way to substitute the literal `osb_sealed_xxx` strings on outbound
  // HTTPS, so the guest's first secret-using call after migration fails
  // auth. Mirrors the SealedTokens/EgressAllowlist/TokenHosts fields the
  // hibernate path persists into snapshot-meta.json.
  map<string, string> sealed_tokens = 7;       // sealed_id -> plaintext secret value
  repeated string egress_allowlist = 8;        // host allowlist for the secrets proxy
  map<string, HostList> token_hosts = 9;       // sealed_id -> per-token allowed hosts
  // env-var-name -> sealed_id index. Required so refresh-by-name
  // (UpdateSandboxSecret) keeps working on the destination worker after
  // migration. Without it, post-migration secret-store updates would silently
  // miss because the destination's session has no name → token mapping.
  map<string, string> sealed_names = 10;
}

// HostList is a wrapper because proto3 maps cannot have a repeated value type.
message HostList {
  repeated string hosts = 1;
}

message PrepareMigrationIncomingRequest {
  string sandbox_id = 1;
  string rootfs_path = 2;    // local path to rootfs on target (pre-copied)
  string workspace_path = 3; // local path to workspace on target (pre-copied)
  int32 cpu_count = 4;
  int32 memory_mb = 5;
  int32 guest_port = 6;
  string template = 7;
  string rootfs_s3_key = 8;     // if set, download from S3 instead of using local rootfs_path
  string workspace_s3_key = 9;  // if set, download from S3 instead of using local workspace_path
  bool overlay_mode = 10;       // if true, rootfs is thin overlay — rebase to local golden on target
  int32 target_memory_mb = 11;  // final memory after scale — worker checks capacity and reserves atomically
  string source_golden_version = 12;  // source's golden version — target rebases overlay if different from its own
  // Secrets-proxy session state captured from the source by PreCopyDrives.
  // Target re-registers these on its in-process secrets proxy BEFORE the
  // VM resumes (Cont) so the first outbound HTTPS request after migration
  // has its `osb_sealed_xxx` env vars correctly substituted.
  map<string, string> sealed_tokens = 13;
  repeated string egress_allowlist = 14;
  map<string, HostList> token_hosts = 15;
  map<string, string> sealed_names = 16;
}

message PrepareMigrationIncomingResponse {
  string incoming_addr = 1;  // TCP address for source to migrate to (e.g. "10.100.1.7:49152")
  int32 host_port = 2;       // mapped host port on target worker
}

message UpdateSandboxSecretRequest {
  string sandbox_id = 1;
  string secret_name = 2; // env var name (the key in the secret store)
  string value = 3;       // new plaintext value
}

message UpdateSandboxSecretResponse {
  // updated is false if the worker has no proxy session for this sandbox
  // or the secret_name isn't registered on the session. Caller logs +
  // surfaces; not necessarily a hard error (sandbox may be mid-migration).
  bool updated = 1;
}

message LiveMigrateRequest {
  string sandbox_id = 1;
  string incoming_addr = 2;  // TCP address from PrepareMigrationIncoming
}

message LiveMigrateResponse {}

message CompleteMigrationIncomingRequest {
  string sandbox_id = 1;
}

message CompleteMigrationIncomingResponse {}

// Golden snapshot management
message RebuildGoldenSnapshotRequest {}

message RebuildGoldenSnapshotResponse {
  string old_version = 1;    // previous golden version (empty if none)
  string new_version = 2;    // new golden version after rebuild
}
